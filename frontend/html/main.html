<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starbleep</title>
    <link rel="stylesheet" href="../ccs/main.css">
</head>
<body>
    <nav>
        <div class="logoDiv">
            <img src="../img/logo_placeholder.svg" alt="logo" class="logo">
        </div>
        <div class="barDiv">
            <a href="">Missions</a>
            <a href="">Mars</a>
            <a href="">Moon</a>
            <a href="">About</a>
        </div>
    </nav>
    <main>
        <h1 class="mainLogo">Starbleep</h1>
        <button class="explore">Explore More</button>
        <img src="../img/arrow-down-long-solid-full.svg" alt="" class="arrow">
    </main>
    <div class="planets">
        <h1>Choose Your Destination</h1>
        <div class="solar-system">
            <div class="orbit mars-orb"><div class="planet mars"></div></div>
            <div class="orbit moon-orb"><div class="planet moon"></div></div>
            <div class="orbit earth-orb"><div class="planet earth"></div></div>
        </div>
    </div>
    <script src="../js/observer.js"></script>
</body>
</html>
