<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starbleep</title>
    <link rel="stylesheet" href="../css/general.css">
    <link rel="stylesheet" href="../css/missions.css">
</head>
<body>
    <nav>
        <div class="logoDiv">
            <img src="../img/logo_placeholder.svg" alt="logo" class="logo" onclick="window.location.replace('./main.html')">
        </div>
        <div class="barDiv">
            <a href="">Missions</a>
            <a href="">About</a>
        </div>
    </nav>
    <main>
        <div class="top">
            <h1>Missions</h1>
            <form action="">
                <div class="filterbox">
                    <select class="moonselect" name="filter" id="">
                        <option value="">Year</option>
                        <option value="1990-2000">1990-2000</option>
                        <option value="2000-2010">2000-2010</option>
                        <option value="2010-2020">2010-2020</option>
                        <option value="2020-2026">2020-2026</option>
                    </select>
                    <select class="moonselect" name="type" id="">
                        <option value="">Type</option>
                        <option value="rover">Rover</option>
                        <option value="lander">Lander</option>
                        <option value="orbiter">Orbiter</option>
                    </select>
                    <select class="moonselect" name="status" id="">
                        <option value="">Status</option>
                        <option value="active">Active</option>
                        <option value="Inactive">Inactive</option>
                    </select>
                </div>
                <button type="submit">Filter</button>
            </form>
        </div>
        <div class="box">
            <div class="moon">

            </div>
        </div>
    </main>

</body>
</html>
