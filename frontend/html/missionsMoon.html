<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starbleep</title>
    <link rel="stylesheet" href="../css/general.css">
    <link rel="stylesheet" href="../css/missions.css">
</head>
<body>
    <nav>
        <div class="logoDiv">
            <button id="backButton" onclick="window.history.back()"><img src="../img/back.svg" alt=""></button>
            <img src="../img/logo_placeholder.svg" alt="logo" class="logo" onclick="window.location.replace('./main.html')">
        </div>
        <div class="barDiv">
            <a href="missionsMars.html">Missions</a>
            <a href="about.html">About</a>
            <button class="filter-reopen" id="reopenFilter" style="display:none">Filter</button>
        </div>
    </nav>
    <main>
        <div class="top moontop" id="filterModal">
            <h1>Missions</h1>
            <form action="">
                <div class="filterbox">
                    <select class="moonselect" name="filter" id="">
                        <option value="Year">Year</option>
                        <option value="1990-2000">1990-2000</option>
                        <option value="2000-2010">2000-2010</option>
                        <option value="2010-2020">2010-2020</option>
                        <option value="2020-2030">2020-2030</option>
                    </select>
                    <select class="moonselect" name="type" id="">
                        <option value="Type">Type</option>
                        <option value="Rover">Rover</option>
                        <option value="Lander">Lander</option>
                        <option value="Orbiter">Orbiter</option>
                    </select>
                    <select class="moonselect" name="status" id="">
                        <option value="Status">Status</option>
                        <option value="Active">Active</option>
                        <option value="Inactive">Inactive</option>
                    </select>
                </div>
                <button class="filter">Filter</button>
            </form>
        </div>
        <div class="box">
            <div class="moon blurred">

            </div>
            <div class="nothing hidden"><h1>Nothing Found!</h1></div>
        </div>
    </main>
</body>
</html>
